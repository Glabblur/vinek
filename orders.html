<html>

    nav ul {
        list-style: none;
        display: flex;
        gap: 6px;
        margin: 0;
        padding: 0;
    }

<header>
    <a href="index.html" class="logo">KICK<span>HOUSE</span></a>
    <nav>
        <ul>
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="products.html">Our Products</a></li>
            <li><a href="orders.html">Order Now</a></li>
            <li><a href="about.html">About Us</a></li>
            <li><a href="contact.html">Contact Us</a></li>
        </ul>
    </nav>

<head>
    <title>Order Now!</title>
</head>

<body>
    <section>
        <h2 class="section-title">Order Now</h2>
        <p class="section-sub">Fill in your details and we'll get your kicks moving.</p>

        <form class="form-wrap" action="#" method="post">

            <fieldset>
                <legend>Customer Details</legend>

                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Vinek Mohan" required>
                </div>

                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="example@gmail.com" required>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>
                    <input type="tel" id="phone" name="phone" placeholder="+65 1234 5678" required>
                </div>

                <div class="form-group">
                    <label for="address">Delivery Address</label>
                    <textarea id="address" name="address" rows="3" placeholder="Street, unit, postal code"
                        required></textarea>
                </div>
            </fieldset>

            <fieldset>
                <legend>Order Details</legend>

                <div class="form-group">
                    <label for="product">Product</label>
                    <select id="product" name="product" required>
                        <option value="">Select a product</option>
                        <option value="air-zoom-pulse">Air Zoom Pulse - $129.00</option>
                        <option value="court-legacy-hi">Court Legacy Hi - $149.00</option>
                        <option value="street-runner-og">Street Runner OG - $99.00</option>
                        <option value="essential-hoodie">Essential Hoodie - $59.00</option>
                        <option value="graphic-tee">Graphic Tee - $29.00</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="size">Size</label>
                    <select id="size" name="size" required>
                        <option value="">Select size</option>
                        <option value="us6">US 6</option>
                        <option value="us7">US 7</option>
                        <option value="us8">US 8</option>
                        <option value="us9">US 9</option>
                        <option value="us10">US 10</option>
                        <option value="us11">US 11</option>
                        <option value="us12">US 12</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="quantity">Quantity</label>
                    <input type="number" id="quantity" name="quantity" min="1" max="10" value="1" required>
                </div>

                <div class="form-group">
                    <label>Payment Method</label>
                    <div class="radio-group">
                        <label><input type="radio" name="payment" value="card" checked> Credit / Debit Card</label>
                        <label><input type="radio" name="payment" value="paynow"> PayNow</label>
                        <label><input type="radio" name="payment" value="cod"> Cash on Delivery</label>
                    </div>
                </div>

                <div class="form-group">
                    <label>Add-ons</label>
                    <div class="checkbox-group">
                        <label><input type="checkbox" name="addon" value="giftwrap"> Gift Wrap</label>
                        <label><input type="checkbox" name="addon" value="express"> Express Delivery</label>
                    </div>
                </div>
            </fieldset>

            <fieldset>
                <legend>Feedback (Optional)</legend>
                <div class="form-group">
                    <label for="feedback">Comments or special requests</label>
                    <textarea id="feedback" name="feedback" rows="4"
                        placeholder="Let us know anything else..."></textarea>
                </div>
            </fieldset>

            <button type="submit" class="btn">Place Order</button>
        </form>
    </section>

    <footer>
        <p>2026 KickHouse. All rights reserved.</p>
        <p>Follow us: Instagram | TikTok | Twitter</p>
    </footer>
</body>

</html>
