        padding: 25px 40px;

          letter-spacing: -0.5px;

        ">KICK HOUSE</a>

        <nav>
            <ul style="
            display: flex;

            padding: 0;
            margin: 0;

          ">
                <li>
                    <a href="index.html" style="

                padding: 8px 16px;

              ">Home</a>

                    <a href="products.html" style="
                color: white;

                background-color: transparent;
              ">Our Products</a>
                </li>
                <li>
                    <a href="orders.html" style="
                color: white;

              ">Order Now</a>

    </header>

    <section class="order-section">
        <div class="order-form">
            <h2 class="section-title">Place Your Order</h2>
            <p class="section-sub">Fill out the form below to place your order.</p>

            <form class="form-wrap" action="order-success.html" method="get">

                <div class="order-layout">

                    <!-- LEFT COLUMN -->
                    <fieldset class="col-left">
                        <legend>Customer Details</legend>

                        <div class="form-group">
                            <label for="fullname">Full name</label>
                            <input type="text" id="fullname" name="fullname" placeholder="Vinek Mohan" required>
                        </div>

                        <div class="form-group">
                            <label for="email">Email</label>
                            <input type="email" id="email" name="email" placeholder="example@gmail.com" required>
                        </div>

                        <div class="form-group">
                            <label for="phone">Phone Number</label>
                            <input type="tel" id="phone" name="phone" placeholder="+65 1234 5678" required>
                        </div>

                        <div class="form-group">
                            <label for="address">Delivery Address</label>
                            <textarea id="address" name="address" rows="3" placeholder="Street, unit, postal code"
                                required></textarea>
                        </div>
                    </fieldset>

                    <!-- RIGHT COLUMN -->
                    <fieldset class="col-right">
                        <legend>Order Summary</legend>

                        <div class="form-group">
                            <label for="product">Product</label>
                            <select id="product" name="product" required>
                                <option value="">Select a product</option>
                                <option value="air-zoom-gt-jump">Air Zoom GT Jump - $190.00</option>
                                <option value="air-jordan-1-low">Air Jordan 1 Low - $189.00</option>
                                <option value="nike-gt-cut-academy-2-ep">Nike GT Cut Academy 2 EP - $136.00</option>
                                <option value="jordan-all-game-pf">Jordan All Game PF - $129.00</option>
                                <option value="luka-5">Luka 5 - $209.00</option>
                                <option value="caitlin-1-ep">Caitlin 1 EP - $209.00</option>
                                <option value="nike-dunk-low-panda">Nike Dunk Low Panda - $119.00</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="size">Size</label>
                            <select id="size" name="size" required>
                                <option value="">Select size</option>
                                <option value="us9">US M 9/ W 7.5</option>
                                <option value="us10">US M 10/ W 8.5</option>
                                <option value="us11">US M 11/ W 9.5</option>
                                <option value="us12">US M 12/ W 10.5</option>
                                <option value="us13">US M 13/ W 11.5</option>
                                <option value="us14">US M 14/ W 12.5</option>
                                <option value="us15">US M 15/ W 13.5</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label for="quantity">Quantity</label>
                            <input type="number" id="quantity" name="quantity" min="1" max="10" value="1" required>
                        </div>

                        <div class="form-group">
                            <label>Payment Method</label>
                            <div class="radio-group">
                                <label><input type="radio" name="payment" value="card" checked> Credit / Debit
                                    Card</label>
                                <label><input type="radio" name="payment" value="paynow"> PayNow</label>
                                <label><input type="radio" name="payment" value="cod"> Cash on Delivery</label>
                            </div>
                        </div>

                        <div class="form-group">
                            <label>Add-ons</label>
                            <div class="checkbox-group">
                                <label><input type="checkbox" name="addon" value="giftwrap"> Gift Wrap</label>
                                <label><input type="checkbox" name="addon" value="express"> Express Delivery</label>
                            </div>
                        </div>
                    </fieldset>

                </div>

                <fieldset>
                    <legend>Feedback (Optional)</legend>
                    <div class="form-group">
                        <label for="feedback">Comments or special requests</label>
                        <textarea id="feedback" name="feedback" rows="4"
                            placeholder="Let us know anything else..."></textarea>
                    </div>
                </fieldset>

                <button type="submit" class="btn">Place Order</button>
            </form>
        </div>
    </section>

    <footer>
        <p>2026 KickHouse. All rights reserved.</p>
        <p>Follow us: Instagram | TikTok | Twitter</p>
    </footer>
</body>

</html>
